server:
  port: 8083

spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 50MB
  mongodb:
    uri: "mongodb://${MEDIA_MONGO_DB_USER:rserraf}:${MEDIA_MONGO_DB_PWD:123456}@localhost:${MEDIA_MONGO_LOCAL_PORT:27018}/${MEDIA_MONGO_DB_NAME:mongo-media}?authSource=admin"
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9092}
    consumer:
      group-id: media-service-group
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*" # very important      # allow deserializing your event classes
        spring.json.value.default.type: com.buy01.media.infrastructure.web.dto.ImagesLinkedEvent

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
      register-with-eureka: true
      fetch-registry: true
