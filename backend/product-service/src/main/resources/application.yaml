server:
  port: 8082

spring:
  application:
    name: product-service
  mongodb:
    uri: "mongodb://${PRODUCT_MONGO_DB_USER:rserraf}:${PRODUCT_MONGO_DB_PWD:123456}@localhost:${PRODUCT_MONGO_LOCAL_PORT:27019}/${PRODUCT_MONGO_DB_NAME:mongo-product}?authSource=admin"
  # cloud:
  #   loadbalancer:
  #     cache:
  #       enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
      register-with-eureka: true
      fetch-registry: true
      
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
