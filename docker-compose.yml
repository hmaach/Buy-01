services:
  # servers
  discovery-server:
    build: ./backend/discovery-server/
    container_name: discovery-server
    ports:
      - "${DISCOVERY_PORT}:8761"
    networks:
      - ecommerce-network

  # kafka broker
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ecommerce-network

  # API GATEWAY
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - discovery-server
      - user-service
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      EUREKA_URL: http://discovery-server:${DISCOVERY_PORT}/eureka
      SPRING_PROFILES_ACTIVE: docker
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    networks:
      - ecommerce-network

  # USER DATABASE
  mongo-user:
    image: mongo:7
    container_name: mongo-user
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${USER_MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${USER_MONGO_PASSWORD}
    volumes:
      - mongo-user-data:/data/db
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MEDIA DATABASE
  mongo-media:
    container_name: ${MEDIA_MONGO_DB_NAME}
    image: mongo:7
    command: mongod --port ${MEDIA_MONGO_DOCKER_PORT}
    ports:
      - "${MEDIA_MONGO_LOCAL_PORT}:${MEDIA_MONGO_DOCKER_PORT}"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MEDIA_MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MEDIA_MONGO_DB_PWD}
      MONGO_INITDB_DATABASE: ${MEDIA_MONGO_DB_NAME}
    volumes:
      - media-mongo-data:/data/db
    networks:
      - ecommerce-network

  # PRODUCT DATABASE
  mongo-product:
    container_name: ${PRODUCT_MONGO_DB_NAME}
    image: mongo:7
    command: mongod --port ${PRODUCT_MONGO_DOCKER_PORT}
    ports:
      - "${PRODUCT_MONGO_LOCAL_PORT}:${PRODUCT_MONGO_DOCKER_PORT}"
    environment:
      MONGO_INITDB_DATABASE: ${PRODUCT_MONGO_DB_NAME}
      MONGO_INITDB_ROOT_USERNAME: ${PRODUCT_MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${PRODUCT_MONGO_DB_PWD}
    volumes:
      - product-mongo-data:/data/db
    networks:
      - ecommerce-network

  # USER SERVICE
  user-service:
    build: ./backend/user-service
    container_name: user-service
    restart: unless-stopped
    # depends_on:
    #   mongo-user:
    #     condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT}:8080"
    environment:
      EUREKA_URL: http://discovery-server:${DISCOVERY_PORT}/eureka
      SPRING_PROFILES_ACTIVE: docker
      MONGO_HOST: mongo-user
      MONGO_PORT: 27017
      MONGO_DB: ${USER_MONGO_DB}
      MONGO_USERNAME: ${USER_MONGO_USERNAME}
      MONGO_PASSWORD: ${USER_MONGO_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    networks:
      - ecommerce-network

# NETWORK
networks:
  ecommerce-network:
    driver: bridge

# VOLUMES
volumes:
  mongo-user-data:
  product-mongo-data:
  media-mongo-data:
  kafka-data:
