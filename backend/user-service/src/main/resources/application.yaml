server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
      register-with-eureka: true
      fetch-registry: true

spring:
  application:
    name: user-service

  docker:
    compose:
      enabled: false

  jwt:
    secret: ${JWT_SECRET:azertyusdjfgjksdflujhdslkfjhsdkfuhskihdfkshdkfhsdkufhksjdhfkjsdhkjsdhfkjsiopqsdfghjklmwxcvbn}
    expiration: 86400000

  spring:
  data:
    mongodb:
      host: ${USER_MONGO_HOST:localhost}
      port: ${USER_MONGO_PORT:27017}
      database: ${USER_MONGO_DB:user_db}
      username: ${USER_MONGO_USERNAME:user_service}
      password: ${USER_MONGO_PASSWORD:user_password}
      authentication-database: admin

media:
  service:
    url: ${MEDIA_SERVICE_URL:http://localhost:8083}
