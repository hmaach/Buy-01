server:
  port: 8080

spring:
  application:
    name: gateway

  docker:
    compose:
      enabled: false

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**
              filters:
                - Authentication

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/products/**
              filters:
                - Authentication

            - id: media-service
              uri: lb://MEDIA-SERVICE
              predicates:
                - Path=/media/**
              filters:
                - Authentication
        error:
          include-message: always
          include-binding-errors: always
          include-stacktrace: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}

logging:
  level:
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

gateway:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:100}
    refill-minutes: ${RATE_LIMIT_REFILL_MINUTES:1}
